<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Current Location Weather</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
<div class="container">

    <button id="back-button">
        ← Back
    </button>

    <h1 class="title">
        Current Location Weather
    </h1>

</div>
        

        <div id="output">

            <div class="info-box">
                <div class="info-title">Location</div>

                <div id="city-location" class="info-value"></div>
            </div>

            <div class="info-box">
                <div class="info-title">Temperature</div>

                <div id="city-temperature" class="info-value"></div>
            </div>

            <div class="info-box">
                <div class="info-title">Local Time</div>

                <div id="city-time" class="info-value"></div>
            </div>

        </div>

    </div>

    <script src="current_location.js"></script>

</body>
</html>
