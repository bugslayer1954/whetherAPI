<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Mode Selection</title>

    <link rel="stylesheet" href="index_style.css">
</head>

<body>

    <div class="container">

        <h1 class="title">
            Weather App
        </h1>

        <div class="subtitle">
            Choose how you want to fetch weather data
        </div>

        <div id="choice">

            <button id="current_location" class="choice-button">
                Use Current Location
            </button>

            <button id="city_name" class="choice-button">
                Enter City Name
            </button>

        </div>

    </div>

    <script src="index.js"></script>

</body>

</html>
